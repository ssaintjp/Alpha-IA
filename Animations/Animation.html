<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação de Chat - Alpha Tec.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #4263EB;
            --cor-fundo: #f8f9fa;
            --cor-borda-celular: #1c1c1e;
            --cor-bolha-assistente: #4263EB;
            --cor-texto-assistente: #ffffff;
            --cor-bolha-usuario: #E9ECEF;
            --cor-texto-usuario: #212529;
            --cor-fundo-tela: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #343a40;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding:0px;
            box-sizing: border-box;
        }

        /* Estrutura do celular */
        .celular {
            width: 310px;
            height: 625px;
            background-color: var(--cor-borda-celular);
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .tela {
            width: 310px;
            height: 650px;
            background-color: var(--cor-fundo-tela);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: #4a4a4a 0px 0px 5px 3px;
        }

        /* Cabeçalho do chat */
        .cabecalho {
            background-color: var(--cor-primaria);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
            border-bottom: 0px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }

        .info-contato h1 {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 700;
        }

        .info-contato p {
            font-size: 0.80rem;
            margin: 0;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Área das mensagens */
        .area-mensagens {
            flex-grow: 1;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bolha-mensagem {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: surgir 0.5s forwards ease-out;
            line-height: 1.5;
            font-size: 0.80rem;
        }

        .bolha-mensagem.assistente {
            background-color: var(--cor-bolha-assistente);
            color: var(--cor-texto-assistente);
            border-bottom-left-radius: 5px;
            align-self: flex-start;
        }

        .bolha-mensagem.usuario {
            background-color: var(--cor-bolha-usuario);
            color: var(--cor-texto-usuario);
            border-bottom-right-radius: 5px;
            align-self: flex-end;
        }

        /* Animação de "digitando" */
        .digitando {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 18px;
        }

        .digitando span {
            width: 8px;
            height: 8px;
            background-color: #b4b8bd;
            border-radius: 50%;
            animation: pulsar 1.2s infinite ease-in-out;
        }

        .digitando span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .digitando span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        /* Rodapé com campo de digitação */
        .rodape-chat {
            padding: 15px;
            background-color: var(--cor-fundo-tela);
            border-top: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .campo-texto {
            flex-grow: 1;
            height: 44px;
            background-color: #f1f3f5;
            border-radius: 22px;
            border: 1px solid #dee2e6;
        }

        .botao-enviar {
            width: 44px;
            height: 44px;
            background-color: var(--cor-primaria);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            cursor: pointer;
        }
        
        .botao-enviar svg {
            width: 20px;
            height: 20px;
            color: white;
            transform: translateX(1px);
        }

        /* Animações */
        @keyframes surgir {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulsar {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1.0);
            }
        }
        
    </style>
</head>
<body>

    <div class="celular">
        <div class="tela">
            <header class="cabecalho">
                <div class="avatar">
                    <img src="../images/Avatar.png" alt="Avatar do Assistente" style="width: 100%; height: 100%; border-radius: 50%;">
                </div>
                <div class="info-contato">
                    <h1>Lia da Alpha</h1>
                    <p>Ass. Virtual 24h</p>
                </div>
            </header>
            <main class="area-mensagens" id="chatbox">
                <!-- Mensagens serão inseridas aqui via JS -->
            </main>
            <footer class="rodape-chat">
                <div class="campo-texto"></div>
                <button class="botao-enviar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </footer>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatbox = document.getElementById('chatbox');
            const areaMensagens = document.querySelector('.area-mensagens');

            const mensagens = [
                { texto: "Oi!", tipo: 'usuario', delay: 800 },
                { texto: "Olá! Sou a Lia, sua assistente virtual. Como posso ajudar?", tipo: 'assistente', delay: 1000 },
                { texto: "Gostaria de mais informações sobre os produtos da Alpha.", tipo: 'usuario', delay: 1200 },
                { texto: "Entendi seu pedido! Vou explicar brevemente como funcionam os nossos produtos.", tipo: 'assistente', delay: 1400 }
            ];

            let tempoAcumulado = 0;

            function rolarParaFinal() {
                areaMensagens.scrollTop = areaMensagens.scrollHeight;
            }

            function mostrarDigitando() {
                const digitandoDiv = document.createElement('div');
                digitandoDiv.classList.add('bolha-mensagem', 'assistente', 'digitando');
                digitandoDiv.innerHTML = '<span></span><span></span><span></span>';
                digitandoDiv.style.animationDelay = `0s`;
                chatbox.appendChild(digitandoDiv);
                rolarParaFinal();
                return digitandoDiv;
            }

            function digitarMensagem(elemento, texto, callback) {
                let i = 0;
                elemento.textContent = '';
                const intervalo = setInterval(() => {
                    if (i < texto.length) {
                        elemento.textContent += texto.charAt(i);
                        i++;
                        rolarParaFinal();
                    } else {
                        clearInterval(intervalo);
                        if (callback) callback();
                    }
                }, 40);
            }

            function exibirProximaMensagem(index) {
                if (index >= mensagens.length) {
                    // Ao final, mostra "digitando" e reinicia após um tempo
                    const digitandoIndicator = mostrarDigitando();
                    setTimeout(() => {
                        chatbox.innerHTML = '';
                        exibirProximaMensagem(0);
                    }, 2000); // tempo que fica "digitando" antes de reiniciar
                    return;
                }

                const msg = mensagens[index];
                tempoAcumulado += msg.delay;

                setTimeout(() => {
                    let digitandoIndicator;

                    if (msg.tipo === 'assistente') {
                        digitandoIndicator = mostrarDigitando();
                    }

                    const delayDigitando = msg.tipo === 'assistente' ? 1500 : 100;

                    setTimeout(() => {
                        if (digitandoIndicator) {
                            chatbox.removeChild(digitandoIndicator);
                        }

                        const bolha = document.createElement('div');
                        bolha.classList.add('bolha-mensagem', msg.tipo);

                        chatbox.appendChild(bolha);
                        rolarParaFinal();

                        digitarMensagem(bolha, msg.texto, () => {
                            exibirProximaMensagem(index + 1);
                        });

                    }, delayDigitando);

                }, msg.delay);
            }

            exibirProximaMensagem(0);
        });
    </script>
</body>
</html>
